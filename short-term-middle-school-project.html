    <script>

            return new URLSearchParams(window.location.search).get(name);

        const projects = {

            },
            oxbridge: {

                season: '暑期项目',
                content: '<p>进入牛津或剑桥校园体验学术与创造力课程。项目由顶尖导师设计，适合希望提前接触名校氛围、提升学术能力和英语表达的学生。</p><p>学生将在名校校园中参与课堂讨论、实验项目、文史探访与科研思维训练。</p><ul><li>名校导师授课</li><li>学术与创意项目结合</li><li>校园文化深度体验</li><li>结业证书与作品展示</li></ul>',
                note: '价格：请咨询，班期与名校选择可根据学生背景安排。'
            },
            englishCulture: {
                title: '英语强化与文化融合',
                season: '春/暑假项目',
                content: '<p>将语言训练与英国文化体验融合，帮助学生在课堂、城市游学与社交活动中自然运用英语。</p><p>本项目特别适合希望在短期内提升英语口语和交际表达的学生。</p><ul><li>专业语言强化课堂</li><li>博物馆与城市文化考察</li><li>实地任务与小组互动</li><li>国际学生交流机会</li></ul>',
                note: '价格：请咨询，具体课程内容可根据学生水平进行个性化调整。'
            },
            stem: {
                title: 'STEM科学探险营',
                season: '暑期项目',

                note: '价格：请咨询，适合对科学、工程和创意项目有兴趣的学生。'
            },
            art: {

                season: '春/暑假项目',

                note: '价格：请咨询，项目适合喜欢艺术与表达的学生。'
            },
            leadership: {
                title: '领导力与国际素养',
                season: '暑期项目',
                content: '<p>通过英语环境中的领导力训练与国际议题项目，提升学生的沟通、自信与全球化思维。</p><p>学生将在团队合作、问题解决与展示中锻炼综合素质，培养未来国际学习与交流能力。</p><ul><li>领导力工作坊</li><li>团队建设与挑战</li><li>国际议题讨论</li><li>跨文化合作体验</li></ul>',

        const key = getQueryParam('project');
        const project = projects[key];
        if (!project) {
            document.getElementById('detailTitle').textContent = '项目详情';
            document.getElementById('detailContent').innerHTML = '<p>未找到该项目的详情。请返回中小学生项目页面重新选择。</p>';

            document.getElementById('detailBreadcrumb').textContent = '项目详情';
        } else {
            document.getElementById('detailTitle').textContent = project.title;
            document.getElementById('detailSeason').textContent = project.season;
            document.getElementById('detailContent').innerHTML = project.content;
            document.getElementById('detailNote').textContent = project.note;
            document.getElementById('detailBreadcrumb').textContent = project.title;
        }
