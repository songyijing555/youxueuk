<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formspree 提交测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.6;
        }
        form {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        input, textarea, button {
            font-size: 16px;
            padding: 10px;
        }
        button {
            cursor: pointer;
        }
        .hint {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Formspree 独立测试页</h1>
    <p>这个页面不依赖站点脚本，只做原生表单提交。</p>

    <form action="https://formspree.io/f/xzdkqgok" method="POST" target="_blank">
        <input type="hidden" name="_subject" value="英国游学咨询表单 - 独立测试页">
        <input type="text" name="name" placeholder="姓名" required>
        <input type="email" name="email" placeholder="邮箱">
        <input type="text" name="wechat" placeholder="微信号">
        <textarea name="message" rows="5" placeholder="咨询内容"></textarea>
        <button type="submit">提交到 Formspree</button>
    </form>

    <p class="hint">提交后应打开新标签页。然后去 Formspree Dashboard 的 Submissions 看是否有记录。</p>
</body>
</html>
